<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Comments — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#050505; }
    .admin-toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .comment-admin-card{
      padding:20px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker">Admin Comments</div>
        <h1
          data-lang-zh="管理公共社群中的回應節奏。"
          data-lang-en="Manage the rhythm of responses inside the commons.">
          管理公共社群中的回應節奏。
        </h1>
        <p
          data-lang-zh="這裡集中查看與刪除文章底下的留言。只對管理員開放。"
          data-lang-en="This page centralizes comment review and deletion beneath posts. It is available to admins only.">
          這裡集中查看與刪除文章底下的留言。只對管理員開放。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="adminCommentsGate" class="panel" style="padding:28px; display:none;">
          <p class="note">你沒有權限查看這個頁面。</p>
        </div>

        <div id="adminCommentsApp" style="display:none;">
          <div class="panel" style="padding:28px; margin-bottom:22px;">
            <div class="admin-toolbar">
              <input id="commentSearchInput" class="input" style="max-width:320px; margin:0;" type="text" placeholder="搜尋留言內容或名稱">
              <button id="commentReloadBtn" class="btn">重新整理</button>
            </div>
            <p class="note"
               data-lang-zh="你可以搜尋留言、檢視來源文章、刪除不適當內容。"
               data-lang-en="You can search comments, inspect their source posts, and remove inappropriate content.">
              你可以搜尋留言、檢視來源文章、刪除不適當內容。
            </p>
          </div>

          <div id="adminCommentList" class="post-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let locale = "zh";
    let session = { user: null, role: "guest" };
    let commentsCache = [];

    const TEXT = {
      zh: {
        unauthorized: "你沒有權限查看這個頁面。",
        empty: "目前沒有留言資料。",
        failed: "留言讀取失敗。",
        delete: "刪除",
        deleteConfirm: "要刪除這則留言嗎？",
        fromPost: "來源文章",
        guest: "訪客"
      },
      en: {
        unauthorized: "You do not have permission to view this page.",
        empty: "There are no comments yet.",
        failed: "Failed to load comments.",
        delete: "Delete",
        deleteConfirm: "Delete this comment?",
        fromPost: "Source Post",
        guest: "Guest"
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    async function fetchComments() {
      const list = document.getElementById("adminCommentList");
      const { data, error } = await client
        .from("post_comments")
        .select("id, post_id, user_id, guest_name, content, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].failed}</div>`;
        return;
      }

      const postIds = [...new Set((data || []).map(item => item.post_id).filter(Boolean))];
      const { data: posts } = postIds.length
        ? await client.from("posts").select("id, title").in("id", postIds)
        : { data: [] };

      const postMap = {};
      (posts || []).forEach((p) => { postMap[p.id] = p.title; });

      commentsCache = (data || []).map(item => ({
        ...item,
        post_title: postMap[item.post_id] || ""
      }));

      renderComments();
    }

    function renderComments() {
      const list = document.getElementById("adminCommentList");
      const keyword = (document.getElementById("commentSearchInput").value || "").trim().toLowerCase();

      const filtered = commentsCache.filter((item) => {
        if (!keyword) return true;
        return (
          (item.content || "").toLowerCase().includes(keyword) ||
          (item.guest_name || "").toLowerCase().includes(keyword) ||
          (item.post_title || "").toLowerCase().includes(keyword)
        );
      });

      if (!filtered.length) {
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].empty}</div>`;
        return;
      }

      list.innerHTML = filtered.map((item) => `
        <div class="comment-admin-card">
          <div class="comment-top">
            <div>
              <div class="comment-name">${escapeHtml(item.guest_name || TEXT[locale].guest)}</div>
              <div class="comment-time">${formatDate(item.created_at)}</div>
            </div>
            <div class="comment-actions">
              <button class="mini-btn danger" data-delete-comment="${item.id}">${TEXT[locale].delete}</button>
            </div>
          </div>
          <div class="note" style="margin-bottom:10px;">
            ${TEXT[locale].fromPost}：${escapeHtml(item.post_title || "-")}
          </div>
          <div class="comment-content">${escapeHtml(item.content)}</div>
        </div>
      `).join("");

      document.querySelectorAll("[data-delete-comment]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const ok = confirm(TEXT[locale].deleteConfirm);
          if (!ok) return;
          const { error } = await client.from("post_comments").delete().eq("id", btn.dataset.deleteComment);
          if (error) console.error(error);
          await fetchComments();
        });
      });
    }

    async function initAdminComments() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      const gate = document.getElementById("adminCommentsGate");
      const app = document.getElementById("adminCommentsApp");

      if (session.role !== "admin") {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = TEXT[locale].unauthorized;
        return;
      }

      app.style.display = "block";

      document.getElementById("commentSearchInput").addEventListener("input", renderComments);
      document.getElementById("commentReloadBtn").addEventListener("click", fetchComments);

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        renderComments();
      };

      await fetchComments();
    }

    initAdminComments();
  </script>
</body>
</html>
