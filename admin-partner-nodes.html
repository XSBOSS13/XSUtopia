<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Partner Nodes — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#050505; }

    .node-form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .node-card{
      padding:22px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:var(--shadow);
    }

    .node-card + .node-card{
      margin-top:16px;
    }

    .node-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    @media (max-width: 900px){
      .node-form-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker">Admin Nodes</div>
        <h1
          data-lang-zh="管理平台中的合作節點。"
          data-lang-en="Manage partner nodes inside the platform.">
          管理平台中的合作節點。
        </h1>
        <p
          data-lang-zh="你可以新增節點、編輯節點、切換節點是否啟用，讓合作社區與地圖入口保持可控。"
          data-lang-en="You can create nodes, edit nodes, and toggle whether they are active, so the partner network and map entry remain controlled.">
          你可以新增節點、編輯節點、切換節點是否啟用，讓合作社區與地圖入口保持可控。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="nodeAdminGate" class="panel" style="padding:28px; display:none;">
          <p class="note">你沒有權限查看這個頁面。</p>
        </div>

        <div id="nodeAdminApp" style="display:none;">
          <div class="panel" style="padding:28px; margin-bottom:22px;">
            <h2 style="margin:0 0 18px;"
                data-lang-zh="新增 / 編輯節點"
                data-lang-en="Create / Edit Node">
              新增 / 編輯節點
            </h2>

            <input id="editingNodeId" type="hidden" />

            <div class="node-form-grid">
              <div>
                <label class="label" for="nodeTitle">標題</label>
                <input id="nodeTitle" class="input" type="text" maxlength="120" />
              </div>
              <div>
                <label class="label" for="nodeCategory">類型</label>
                <select id="nodeCategory" class="select">
                  <option value="space">Space</option>
                  <option value="tea">Tea</option>
                  <option value="art">Art</option>
                  <option value="partner">Partner</option>
                  <option value="community">Community</option>
                </select>
              </div>
              <div>
                <label class="label" for="nodeCity">城市</label>
                <input id="nodeCity" class="input" type="text" maxlength="60" />
              </div>
              <div>
                <label class="label" for="nodeAddress">地址</label>
                <input id="nodeAddress" class="input" type="text" maxlength="160" />
              </div>
            </div>

            <label class="label" for="nodeDescription">節點描述</label>
            <textarea id="nodeDescription" class="textarea" maxlength="3000"></textarea>

            <label class="label" for="nodeMapUrl">地圖連結</label>
            <input id="nodeMapUrl" class="input" type="url" maxlength="500" />

            <div class="node-actions">
              <button id="saveNodeBtn" class="btn btn-primary">儲存節點</button>
              <button id="resetNodeBtn" class="btn">清空表單</button>
            </div>

            <div id="nodeAdminStatus" class="status"></div>
          </div>

          <div id="nodeAdminList" class="post-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let session = { user: null, role: "guest" };
    let locale = "zh";

    const TEXT = {
      zh: {
        unauthorized: "你沒有權限查看這個頁面。",
        empty: "目前沒有節點資料。",
        saving: "儲存中...",
        saved: "節點已儲存。",
        failed: "操作失敗。",
        edit: "編輯",
        deactivate: "停用",
        activate: "啟用",
        deleteConfirm: "要清空目前表單嗎？"
      },
      en: {
        unauthorized: "You do not have permission to view this page.",
        empty: "There are no nodes yet.",
        saving: "Saving...",
        saved: "Node saved.",
        failed: "Action failed.",
        edit: "Edit",
        deactivate: "Deactivate",
        activate: "Activate",
        deleteConfirm: "Clear the current form?"
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function setForm(node = null) {
      document.getElementById("editingNodeId").value = node?.id || "";
      document.getElementById("nodeTitle").value = node?.title || "";
      document.getElementById("nodeCategory").value = node?.category || "space";
      document.getElementById("nodeCity").value = node?.city || "";
      document.getElementById("nodeAddress").value = node?.address || "";
      document.getElementById("nodeDescription").value = node?.description || "";
      document.getElementById("nodeMapUrl").value = node?.map_url || "";
    }

    async function saveNode() {
      const status = document.getElementById("nodeAdminStatus");
      status.textContent = TEXT[locale].saving;

      const id = document.getElementById("editingNodeId").value.trim();

      const payload = {
        title: document.getElementById("nodeTitle").value.trim(),
        category: document.getElementById("nodeCategory").value,
        city: document.getElementById("nodeCity").value.trim(),
        address: document.getElementById("nodeAddress").value.trim(),
        description: document.getElementById("nodeDescription").value.trim(),
        map_url: document.getElementById("nodeMapUrl").value.trim()
      };

      let error = null;

      if (id) {
        ({ error } = await client.from("partner_nodes").update(payload).eq("id", id));
      } else {
        ({ error } = await client.from("partner_nodes").insert([{ ...payload, is_active: true }]));
      }

      if (error) {
        console.error(error);
        status.textContent = TEXT[locale].failed;
        return;
      }

      status.textContent = TEXT[locale].saved;
      setForm();
      await renderNodes();
    }

    async function toggleNodeActive(id, isActive) {
      const { error } = await client
        .from("partner_nodes")
        .update({ is_active: !isActive })
        .eq("id", id);

      if (error) console.error(error);
      await renderNodes();
    }

    async function renderNodes() {
      const list = document.getElementById("nodeAdminList");
      const { data, error } = await client
        .from("partner_nodes")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        list.innerHTML = `<div class="node-card">${TEXT[locale].failed}</div>`;
        return;
      }

      if (!data || !data.length) {
        list.innerHTML = `<div class="node-card">${TEXT[locale].empty}</div>`;
        return;
      }

      list.innerHTML = data.map((node) => `
        <div class="node-card">
          <div class="post-meta">
            <div class="post-author">${escapeHtml(node.city || "")}</div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(node.category)}</span>
              <span class="tag ${node.is_active ? 'featured' : ''}">${node.is_active ? 'Active' : 'Inactive'}</span>
            </div>
          </div>

          <h3 style="margin:0 0 12px;">${escapeHtml(node.title)}</h3>
          <p style="margin:0 0 10px; color:var(--muted);">${escapeHtml(node.address || "")}</p>
          <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(node.description || "")}</p>

          <div class="node-actions">
            <button class="btn" data-edit-node="${node.id}">${TEXT[locale].edit}</button>
            <button class="btn" data-toggle-node="${node.id}" data-active="${node.is_active ? "1" : "0"}">
              ${node.is_active ? TEXT[locale].deactivate : TEXT[locale].activate}
            </button>
          </div>
        </div>
      `).join("");

      data.forEach((node) => {
        const editBtn = document.querySelector(`[data-edit-node="${node.id}"]`);
        if (editBtn) editBtn.addEventListener("click", () => setForm(node));

        const toggleBtn = document.querySelector(`[data-toggle-node="${node.id}"]`);
        if (toggleBtn) toggleBtn.addEventListener("click", () => toggleNodeActive(node.id, node.is_active));
      });
    }

    async function initNodeAdmin() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      const gate = document.getElementById("nodeAdminGate");
      const app = document.getElementById("nodeAdminApp");

      if (session.role !== "admin") {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = TEXT[locale].unauthorized;
        return;
      }

      app.style.display = "block";

      document.getElementById("saveNodeBtn").addEventListener("click", saveNode);
      document.getElementById("resetNodeBtn").addEventListener("click", () => {
        if (!confirm(TEXT[locale].deleteConfirm)) return;
        setForm();
      });

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await renderNodes();
      };

      await renderNodes();
    }

    initNodeAdmin();
  </script>
</body>
</html>
