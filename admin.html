<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Center — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#050505; }

    .admin-tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .admin-tab{
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
    }

    .admin-tab.active{
      background:var(--text);
      color:#0a0a0a;
      border-color:transparent;
    }

    .admin-section{
      display:none;
    }

    .admin-section.active{
      display:block;
    }

    .admin-card{
      padding:22px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:var(--shadow);
    }

    .admin-card + .admin-card{
      margin-top:16px;
    }

    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .admin-summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:22px;
    }

    .summary-box{
      padding:20px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    .summary-box strong{
      display:block;
      font-size:28px;
      margin-bottom:6px;
      color:var(--text);
    }

    .summary-box span{
      color:var(--soft);
      font-size:13px;
    }

    @media (max-width: 900px){
      .admin-summary{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker">Admin Center</div>
        <h1
          data-lang-zh="把內容、申請與節點管理集中到同一個中心。"
          data-lang-en="Bring content, applications, and node management into one center.">
          把內容、申請與節點管理集中到同一個中心。
        </h1>
        <p
          data-lang-zh="這裡是 XS UTOPIA 的管理後台。你可以在這裡審核文章、處理合作申請、檢視生態提案。"
          data-lang-en="This is the management backend of XS UTOPIA. Here you can review posts, process partner applications, and inspect ecosystem submissions.">
          這裡是 XS UTOPIA 的管理後台。你可以在這裡審核文章、處理合作申請、檢視生態提案。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="adminGate" class="panel" style="padding:28px; display:none;">
          <p class="note">你沒有權限查看這個頁面。</p>
        </div>

        <div id="adminApp" style="display:none;">
          <div class="admin-summary">
            <div class="summary-box">
              <strong id="summaryPosts">0</strong>
              <span data-lang-zh="待審文章" data-lang-en="Pending Posts">待審文章</span>
            </div>
            <div class="summary-box">
              <strong id="summaryPartners">0</strong>
              <span data-lang-zh="合作申請" data-lang-en="Partner Applications">合作申請</span>
            </div>
            <div class="summary-box">
              <strong id="summarySubmissions">0</strong>
              <span data-lang-zh="生態提案" data-lang-en="Ecosystem Submissions">生態提案</span>
            </div>
          </div>

          <div class="panel" style="padding:28px; margin-bottom:22px;">
            <div class="admin-tabs">
              <button class="admin-tab active" data-admin-tab="posts">文章審核</button>
              <button class="admin-tab" data-admin-tab="partners">合作申請</button>
              <button class="admin-tab" data-admin-tab="submissions">生態提案</button>
            </div>
            <p class="note"
               data-lang-zh="在這裡切換不同管理區塊，處理平台的內容與節點流。"
               data-lang-en="Switch between different management areas here to handle the platform’s content and node flow.">
              在這裡切換不同管理區塊，處理平台的內容與節點流。
            </p>
          </div>

          <section id="section-posts" class="admin-section active">
            <div id="adminPostList"></div>
          </section>

          <section id="section-partners" class="admin-section">
            <div id="adminPartnerList"></div>
          </section>

          <section id="section-submissions" class="admin-section">
            <div id="adminSubmissionList"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let session = { user: null, role: "guest" };
    let locale = "zh";

    const TEXT = {
      zh: {
        unauthorized: "你沒有權限查看這個頁面。",
        noPosts: "目前沒有文章資料。",
        noPartners: "目前沒有合作申請。",
        noSubmissions: "目前沒有生態提案。",
        publish: "發佈",
        archive: "封存",
        feature: "設為精選",
        unfeature: "取消精選",
        delete: "刪除",
        approve: "核准",
        reject: "退回",
        deleteConfirm: "要刪除這筆資料嗎？",
        from: "來自"
      },
      en: {
        unauthorized: "You do not have permission to view this page.",
        noPosts: "There are no posts.",
        noPartners: "There are no partner applications.",
        noSubmissions: "There are no ecosystem submissions.",
        publish: "Publish",
        archive: "Archive",
        feature: "Feature",
        unfeature: "Unfeature",
        delete: "Delete",
        approve: "Approve",
        reject: "Reject",
        deleteConfirm: "Delete this item?",
        from: "From"
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    function initTabs() {
      const tabs = document.querySelectorAll("[data-admin-tab]");
      const sections = {
        posts: document.getElementById("section-posts"),
        partners: document.getElementById("section-partners"),
        submissions: document.getElementById("section-submissions")
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");

          Object.values(sections).forEach((sec) => sec.classList.remove("active"));
          sections[tab.dataset.adminTab].classList.add("active");
        });
      });
    }

    async function updatePost(id, payload) {
      const { error } = await client
        .from("posts")
        .update({ ...payload, updated_at: new Date().toISOString() })
        .eq("id", id);

      if (error) console.error(error);
      await loadAll();
    }

    async function deletePost(id) {
      if (!confirm(TEXT[locale].deleteConfirm)) return;
      const { error } = await client.from("posts").delete().eq("id", id);
      if (error) console.error(error);
      await loadAll();
    }

    async function updatePartnerApplication(id, status) {
      const { error } = await client
        .from("partner_applications")
        .update({ status })
        .eq("id", id);
      if (error) console.error(error);
      await loadAll();
    }

    async function updateSubmission(id, status) {
      const { error } = await client
        .from("ecosystem_submissions")
        .update({ status })
        .eq("id", id);
      if (error) console.error(error);
      await loadAll();
    }

    function bindPostActions() {
      document.querySelectorAll("[data-publish]").forEach((btn) => {
        btn.addEventListener("click", () => updatePost(btn.dataset.publish, { status: "published" }));
      });

      document.querySelectorAll("[data-archive]").forEach((btn) => {
        btn.addEventListener("click", () => updatePost(btn.dataset.archive, { status: "archived" }));
      });

      document.querySelectorAll("[data-feature]").forEach((btn) => {
        btn.addEventListener("click", () => updatePost(btn.dataset.feature, {
          is_featured: btn.dataset.current === "1" ? false : true
        }));
      });

      document.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", () => deletePost(btn.dataset.delete));
      });
    }

    function bindPartnerActions() {
      document.querySelectorAll("[data-partner-approve]").forEach((btn) => {
        btn.addEventListener("click", () => updatePartnerApplication(btn.dataset.partnerApprove, "approved"));
      });

      document.querySelectorAll("[data-partner-reject]").forEach((btn) => {
        btn.addEventListener("click", () => updatePartnerApplication(btn.dataset.partnerReject, "rejected"));
      });
    }

    function bindSubmissionActions() {
      document.querySelectorAll("[data-submission-approve]").forEach((btn) => {
        btn.addEventListener("click", () => updateSubmission(btn.dataset.submissionApprove, "approved"));
      });

      document.querySelectorAll("[data-submission-reject]").forEach((btn) => {
        btn.addEventListener("click", () => updateSubmission(btn.dataset.submissionReject, "rejected"));
      });
    }

    async function renderPosts() {
      const el = document.getElementById("adminPostList");
      const { data } = await client
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      const pendingCount = (data || []).filter(item => item.status === "pending").length;
      document.getElementById("summaryPosts").textContent = pendingCount;

      if (!data || !data.length) {
        el.innerHTML = `<div class="admin-card">${TEXT[locale].noPosts}</div>`;
        return;
      }

      el.innerHTML = data.map(post => `
        <div class="admin-card">
          <div class="post-meta">
            <div class="post-author">${formatDate(post.created_at)}</div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(post.post_type)}</span>
              <span class="tag">${escapeHtml(post.status)}</span>
              ${post.is_featured ? `<span class="tag featured">Featured</span>` : ""}
            </div>
          </div>

          <h3 style="margin:0 0 12px;">${escapeHtml(post.title)}</h3>
          <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>

          <div class="admin-actions">
            ${post.status !== "published" ? `<button class="btn" data-publish="${post.id}">${TEXT[locale].publish}</button>` : ""}
            ${post.status !== "archived" ? `<button class="btn" data-archive="${post.id}">${TEXT[locale].archive}</button>` : ""}
            <button class="btn" data-feature="${post.id}" data-current="${post.is_featured ? "1" : "0"}">
              ${post.is_featured ? TEXT[locale].unfeature : TEXT[locale].feature}
            </button>
            <button class="btn btn-danger" data-delete="${post.id}">${TEXT[locale].delete}</button>
          </div>
        </div>
      `).join("");

      bindPostActions();
    }

    async function renderPartnerApplications() {
      const el = document.getElementById("adminPartnerList");
      const { data } = await client
        .from("partner_applications")
        .select("*")
        .order("created_at", { ascending: false });

      const pendingCount = (data || []).filter(item => item.status === "pending").length;
      document.getElementById("summaryPartners").textContent = pendingCount;

      if (!data || !data.length) {
        el.innerHTML = `<div class="admin-card">${TEXT[locale].noPartners}</div>`;
        return;
      }

      el.innerHTML = data.map(item => `
        <div class="admin-card">
          <div class="post-meta">
            <div class="post-author">${formatDate(item.created_at)}</div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(item.status)}</span>
              ${item.city ? `<span class="tag">${escapeHtml(item.city)}</span>` : ""}
            </div>
          </div>

          <h3 style="margin:0 0 12px;">${escapeHtml(item.brand_name)}</h3>
          <p style="margin:0 0 8px; color:var(--muted);">${TEXT[locale].from} ${escapeHtml(item.contact_name)} · ${escapeHtml(item.email)}</p>
          <p style="margin:0 0 8px; color:var(--muted);">${escapeHtml(item.space_type || "")}</p>
          <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(item.description)}</p>

          <div class="admin-actions">
            ${item.status !== "approved" ? `<button class="btn" data-partner-approve="${item.id}">${TEXT[locale].approve}</button>` : ""}
            ${item.status !== "rejected" ? `<button class="btn btn-danger" data-partner-reject="${item.id}">${TEXT[locale].reject}</button>` : ""}
          </div>
        </div>
      `).join("");

      bindPartnerActions();
    }

    async function renderSubmissions() {
      const el = document.getElementById("adminSubmissionList");
      const { data } = await client
        .from("ecosystem_submissions")
        .select("*")
        .order("created_at", { ascending: false });

      const pendingCount = (data || []).filter(item => item.status === "pending").length;
      document.getElementById("summarySubmissions").textContent = pendingCount;

      if (!data || !data.length) {
        el.innerHTML = `<div class="admin-card">${TEXT[locale].noSubmissions}</div>`;
        return;
      }

      el.innerHTML = data.map(item => `
        <div class="admin-card">
          <div class="post-meta">
            <div class="post-author">${formatDate(item.created_at)}</div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(item.category)}</span>
              <span class="tag">${escapeHtml(item.status)}</span>
            </div>
          </div>

          <h3 style="margin:0 0 12px;">${escapeHtml(item.title)}</h3>
          <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(item.description)}</p>
          ${item.link_url ? `<p style="margin:12px 0 0;"><a class="btn" href="${escapeHtml(item.link_url)}" target="_blank" rel="noopener">Open Link</a></p>` : ""}

          <div class="admin-actions">
            ${item.status !== "approved" ? `<button class="btn" data-submission-approve="${item.id}">${TEXT[locale].approve}</button>` : ""}
            ${item.status !== "rejected" ? `<button class="btn btn-danger" data-submission-reject="${item.id}">${TEXT[locale].reject}</button>` : ""}
          </div>
        </div>
      `).join("");

      bindSubmissionActions();
    }

    async function loadAll() {
      await Promise.all([
        renderPosts(),
        renderPartnerApplications(),
        renderSubmissions()
      ]);
    }

    async function initAdminCenter() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      const gate = document.getElementById("adminGate");
      const app = document.getElementById("adminApp");

      if (session.role !== "admin") {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = TEXT[locale].unauthorized;
        return;
      }

      app.style.display = "block";
      initTabs();

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await loadAll();
      };

      await loadAll();
    }

    initAdminCenter();
  </script>
</body>
</html>
