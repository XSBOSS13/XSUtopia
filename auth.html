<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <main class="container" style="min-height:100vh; display:grid; place-items:center; padding:28px 0;">
    <div class="auth-shell">
      <section class="auth-panel reveal">
        <div class="kicker" data-lang-zh="會員入口" data-lang-en="Member Access">會員入口</div>
        <h1 style="font-size:clamp(42px,5vw,78px); line-height:.98; margin:0 0 18px;"
            data-lang-zh="XS UTOPIA 正在形成一個可參與的場域。"
            data-lang-en="XS UTOPIA is becoming a participatory field.">
          XS UTOPIA 正在形成一個可參與的場域。
        </h1>
        <p style="color:var(--muted); line-height:1.95; font-size:16px; margin:0 0 18px;"
           data-lang-zh="訪客可以進入公共社群閱讀與評論。會員則可以發文、建立連結，並參與整個文化生態的流動。"
           data-lang-en="Guests can enter the public commons to read and comment. Members can publish, connect, and participate in the wider cultural ecosystem.">
          訪客可以進入公共社群閱讀與評論。會員則可以發文、建立連結，並參與整個文化生態的流動。
        </p>
        <p style="color:var(--muted); line-height:1.95; font-size:16px; margin:0;"
           data-lang-zh="登入系統將在全站自動辨識訪客、會員與管理員，並切換對應的操作權限。"
           data-lang-en="The authentication layer automatically identifies guest, member, and admin roles across the site and switches available actions accordingly.">
          登入系統將在全站自動辨識訪客、會員與管理員，並切換對應的操作權限。
        </p>
      </section>

      <section class="auth-panel reveal">
        <div class="auth-tabs">
          <button class="auth-tab active" data-auth-mode="signin">登入</button>
          <button class="auth-tab" data-auth-mode="signup">註冊</button>
        </div>

        <h2 id="authPageTitle" style="margin:0 0 14px;">進入 XS UTOPIA</h2>
        <p id="authPageDesc" style="color:var(--muted); line-height:1.9; margin:0 0 20px;">
          進入平台、參與公共社群，並管理你的會員身份。
        </p>

        <form id="authForm">
          <div id="signUpFields" style="display:none;">
            <label class="label" for="authDisplayName" data-lang-zh="顯示名稱" data-lang-en="Display name">顯示名稱</label>
            <input id="authDisplayName" class="input" type="text" maxlength="24" placeholder="你的名稱" />
          </div>

          <label class="label" for="authEmail">Email</label>
          <input id="authEmail" class="input" type="email" placeholder="you@example.com" required />

          <label class="label" for="authPassword" data-lang-zh="密碼" data-lang-en="Password">密碼</label>
          <input id="authPassword" class="input" type="password" placeholder="••••••••" required />

          <button id="authSubmit" type="submit" class="btn btn-primary" style="width:100%;">登入</button>
          <div id="authPageStatus" class="status"></div>
        </form>

        <div style="margin-top:18px; display:flex; gap:14px; flex-wrap:wrap; color:var(--muted); font-size:14px;">
          <a href="index.html" data-lang-zh="返回首頁" data-lang-en="Back to Home">返回首頁</a>
          <a href="commons.html" data-lang-zh="前往公共社群" data-lang-en="Go to Commons">前往公共社群</a>
        </div>
      </section>
    </div>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    AuthUI.initAuthPage();
    AuthUI.initReveal();
  </script>
</body>
</html>
