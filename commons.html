<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commons — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" class="active" data-i18n-key="nav_commons">公共社群</a>
        <a href="explore.html" data-i18n-key="nav_explore">探索中心</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker" data-lang-zh="Public Commons" data-lang-en="Public Commons">Public Commons</div>
        <h1
          data-lang-zh="讓思想被看見，也讓回應開始流動。"
          data-lang-en="A place where thought becomes visible and response begins to circulate.">
          讓思想被看見，也讓回應開始流動。
        </h1>
        <p
          data-lang-zh="訪客與會員都可以進入這裡閱讀與評論。只有登入後的會員與管理員可以發文，讓平台維持清晰的內容節奏。"
          data-lang-en="Both guests and members can enter to read and comment. Only signed-in members and admins can publish posts, allowing the platform to maintain a clearer rhythm of content.">
          訪客與會員都可以進入這裡閱讀與評論。只有登入後的會員與管理員可以發文，讓平台維持清晰的內容節奏。
        </p>
      </div>
    </section>

    <section>
      <div class="container feed-layout reveal">
        <aside class="panel sidebar-panel">
          <div class="kicker" data-lang-zh="Posting Access" data-lang-en="Posting Access">Posting Access</div>
          <h2 style="margin:0 0 14px;"
              data-lang-zh="內容入口"
              data-lang-en="Entry Point">
            內容入口
          </h2>
          <p class="note"
             data-lang-zh="訪客可閱讀與評論；會員與管理員登入後可發文。"
             data-lang-en="Guests can read and comment; members and admins can publish after signing in.">
            訪客可閱讀與評論；會員與管理員登入後可發文。
          </p>

          <div id="postComposerGuest" style="margin-top:18px;">
            <a href="auth.html" class="btn btn-primary" style="width:100%; justify-content:center;"
               data-lang-zh="登入後發文"
               data-lang-en="Sign in to publish">
              登入後發文
            </a>
          </div>

          <div id="postComposerMember" style="display:none; margin-top:18px;">
            <label class="label" for="postType" data-lang-zh="文章類型" data-lang-en="Post type">文章類型</label>
            <select id="postType" class="select">
              <option value="thought">Thought</option>
              <option value="tea">Tea</option>
              <option value="art">Art</option>
              <option value="ecosystem">Ecosystem</option>
              <option value="partner">Partner</option>
            </select>

            <label class="label" for="postTitle" data-lang-zh="標題" data-lang-en="Title">標題</label>
            <input id="postTitle" class="input" type="text" maxlength="120" />

            <label class="label" for="postContent" data-lang-zh="內容" data-lang-en="Content">內容</label>
            <textarea id="postContent" class="textarea" maxlength="3000"></textarea>

            <button id="postSubmitBtn" class="btn btn-primary" style="width:100%; justify-content:center;"
                    data-lang-zh="發表文章"
                    data-lang-en="Publish Post">
              發表文章
            </button>
            <div id="postStatus" class="status"></div>
          </div>
        </aside>

        <section>
          <div id="postList" class="post-list"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <div>
        <strong style="display:block; margin-bottom:8px; color:var(--text)">XS UTOPIA</strong>
        <span data-lang-zh="公共社群是平台流動真正開始的地方。" data-lang-en="The public commons is where movement in the platform truly begins.">
          公共社群是平台流動真正開始的地方。
        </span>
      </div>
      <div class="footer-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="explore.html" data-i18n-key="nav_explore">探索中心</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </div>
    </div>
  </footer>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let currentSession = { user: null, profile: null, role: "guest" };
    let currentLocale = "zh";

    const postListEl = document.getElementById("postList");
    const postComposerGuest = document.getElementById("postComposerGuest");
    const postComposerMember = document.getElementById("postComposerMember");
    const postSubmitBtn = document.getElementById("postSubmitBtn");
    const postStatus = document.getElementById("postStatus");

    const COMMONS_TEXT = {
      zh: {
        noPosts: "目前還沒有文章。登入後成為第一位發文者。",
        commentPlaceholderGuest: "以訪客身份留下評論...",
        commentPlaceholderMember: "留下你的評論...",
        guestName: "你的名稱",
        submitComment: "送出評論",
        submitPosting: "發表中...",
        submitPost: "發表文章",
        postSuccess: "文章已發表。",
        postError: "發表失敗，請稍後再試。",
        commentSuccess: "評論已送出。",
        commentError: "評論送出失敗。",
        deleteComment: "刪除",
        featured: "精選",
        commentAsGuest: "訪客評論",
        commentAsMember: "會員評論",
        comments: "則評論",
        deleteConfirm: "要刪除這則評論嗎？"
      },
      en: {
        noPosts: "No posts yet. Sign in to become the first author.",
        commentPlaceholderGuest: "Leave a comment as guest...",
        commentPlaceholderMember: "Leave your comment...",
        guestName: "Your name",
        submitComment: "Comment",
        submitPosting: "Publishing...",
        submitPost: "Publish Post",
        postSuccess: "Post published.",
        postError: "Failed to publish.",
        commentSuccess: "Comment posted.",
        commentError: "Failed to post comment.",
        deleteComment: "Delete",
        featured: "Featured",
        commentAsGuest: "Guest Comment",
        commentAsMember: "Member Comment",
        comments: "comments",
        deleteConfirm: "Delete this comment?"
      }
    };

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    function canDeleteComment(comment) {
      if (!currentSession.user) return false;
      if (currentSession.role === "admin") return true;
      return comment.user_id && comment.user_id === currentSession.user.id;
    }

    function updateComposerAccess() {
      if (!currentSession.user) {
        postComposerGuest.style.display = "block";
        postComposerMember.style.display = "none";
      } else {
        postComposerGuest.style.display = "none";
        postComposerMember.style.display = "block";
      }
    }

    async function fetchPosts() {
      const { data: posts, error } = await client
        .from("posts")
        .select("*")
        .eq("status", "published")
        .order("is_featured", { ascending: false })
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        postListEl.innerHTML = `<div class="panel" style="padding:24px;">${currentLocale === "en" ? "Failed to load posts." : "文章載入失敗。"}</div>`;
        return;
      }

      if (!posts || !posts.length) {
        postListEl.innerHTML = `<div class="panel" style="padding:24px;">${COMMONS_TEXT[currentLocale].noPosts}</div>`;
        return;
      }

      const commentsByPost = await fetchCommentsForPosts(posts.map(p => p.id));
      renderPosts(posts, commentsByPost);
    }

    async function fetchCommentsForPosts(postIds) {
      if (!postIds.length) return {};

      const { data: comments, error } = await client
        .from("post_comments")
        .select("*")
        .in("post_id", postIds)
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        return {};
      }

      return (comments || []).reduce((acc, comment) => {
        if (!acc[comment.post_id]) acc[comment.post_id] = [];
        acc[comment.post_id].push(comment);
        return acc;
      }, {});
    }

    function renderPosts(posts, commentsByPost) {
      postListEl.innerHTML = "";

      posts.forEach((post) => {
        const comments = commentsByPost[post.id] || [];
        const postEl = document.createElement("article");
        postEl.className = "post-card";

        const roleLabel = post.user_id ? "Member" : "Admin";

        postEl.innerHTML = `
          <div class="post-meta">
            <div>
              <div class="post-author">${escapeHtml(post.title)}</div>
              <div class="note">${formatDate(post.created_at)}</div>
            </div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(post.post_type)}</span>
              ${post.is_featured ? `<span class="tag featured">${COMMONS_TEXT[currentLocale].featured}</span>` : ""}
            </div>
          </div>

          <h3>${escapeHtml(post.title)}</h3>
          <p>${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>

          <div class="comment-section">
            <div class="note">${comments.length} ${COMMONS_TEXT[currentLocale].comments}</div>

            <div class="comment-form-row" style="margin-top:14px;">
              <div>
                ${!currentSession.user ? `
                  <input id="guestName-${post.id}" class="input" maxlength="24" placeholder="${COMMONS_TEXT[currentLocale].guestName}">
                ` : ""}
                <textarea id="commentInput-${post.id}" class="textarea" maxlength="600" placeholder="${currentSession.user ? COMMONS_TEXT[currentLocale].commentPlaceholderMember : COMMONS_TEXT[currentLocale].commentPlaceholderGuest}"></textarea>
              </div>
              <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-primary" data-comment-submit="${post.id}">${COMMONS_TEXT[currentLocale].submitComment}</button>
              </div>
            </div>

            <div class="comment-list">
              ${comments.map(comment => `
                <div class="comment-card">
                  <div class="comment-top">
                    <div>
                      <div class="comment-name">${escapeHtml(comment.user_id ? (currentLocale === "en" ? COMMONS_TEXT.en.commentAsMember : COMMONS_TEXT.zh.commentAsMember) : comment.guest_name || (currentLocale === "en" ? "Guest" : "訪客"))}</div>
                      <div class="comment-time">${formatDate(comment.created_at)}</div>
                    </div>
                    <div class="comment-actions">
                      ${canDeleteComment(comment) ? `<button class="mini-btn danger" data-comment-delete="${comment.id}">${COMMONS_TEXT[currentLocale].deleteComment}</button>` : ""}
                    </div>
                  </div>
                  <div class="comment-content">${escapeHtml(comment.content)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        `;

        postListEl.appendChild(postEl);
      });

      bindCommentActions();
    }

    function bindCommentActions() {
      document.querySelectorAll("[data-comment-submit]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.dataset.commentSubmit;
          const input = document.getElementById(`commentInput-${postId}`);
          const guestNameInput = document.getElementById(`guestName-${postId}`);
          const content = (input.value || "").trim();

          if (!content) return;

          const payload = {
            post_id: postId,
            content
          };

          if (currentSession.user) {
            payload.user_id = currentSession.user.id;
          } else {
            const guestName = (guestNameInput?.value || "").trim();
            if (!guestName) {
              alert(currentLocale === "en" ? "Please enter your name." : "請先輸入你的名稱。");
              return;
            }
            payload.guest_name = guestName;
            payload.user_id = null;
          }

          const { error } = await client.from("post_comments").insert([payload]);

          if (error) {
            console.error(error);
            alert(COMMONS_TEXT[currentLocale].commentError);
            return;
          }

          await fetchPosts();
        });
      });

      document.querySelectorAll("[data-comment-delete]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.commentDelete;
          const ok = confirm(COMMONS_TEXT[currentLocale].deleteConfirm);
          if (!ok) return;

          const { error } = await client
            .from("post_comments")
            .delete()
            .eq("id", id);

          if (error) {
            console.error(error);
            alert(COMMONS_TEXT[currentLocale].commentError);
            return;
          }

          await fetchPosts();
        });
      });
    }

    async function submitPost() {
      if (!currentSession.user) {
        window.location.href = "auth.html";
        return;
      }

      const titleEl = document.getElementById("postTitle");
      const contentEl = document.getElementById("postContent");
      const typeEl = document.getElementById("postType");

      const title = (titleEl.value || "").trim();
      const content = (contentEl.value || "").trim();
      const postType = typeEl.value;

      if (!title || !content) return;

      postSubmitBtn.disabled = true;
      postSubmitBtn.textContent = COMMONS_TEXT[currentLocale].submitPosting;
      postStatus.textContent = COMMONS_TEXT[currentLocale].submitPosting;

      const { error } = await client
        .from("posts")
        .insert([{
          user_id: currentSession.user.id,
          title,
          content,
          post_type: postType,
          status: "published"
        }]);

      postSubmitBtn.disabled = false;
      postSubmitBtn.textContent = COMMONS_TEXT[currentLocale].submitPost;

      if (error) {
        console.error(error);
        postStatus.textContent = COMMONS_TEXT[currentLocale].postError;
        return;
      }

      titleEl.value = "";
      contentEl.value = "";
      postStatus.textContent = COMMONS_TEXT[currentLocale].postSuccess;
      await fetchPosts();
    }

    async function initCommons() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      currentSession = auth.getSession();
      currentLocale = AuthUI.getLocale();

      updateComposerAccess();

      postSubmitBtn.addEventListener("click", submitPost);

      window.onXSLocaleChange = async (locale) => {
        currentLocale = locale;
        await fetchPosts();
      };

      await fetchPosts();

      const realtimeChannel = client
        .channel("xs-utopia-posts")
        .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, async () => {
          await fetchPosts();
        })
        .on("postgres_changes", { event: "*", schema: "public", table: "post_comments" }, async () => {
          await fetchPosts();
        })
        .subscribe();

      return realtimeChannel;
    }

    initCommons();
  </script>
</body>
</html>
