name: 🚨 DIGITAL_EXECUTIVE_DEPLOY

on:
  repository_dispatch:
    types: [remote_deploy] # 只接收來自 Edge Function 的特定指令

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠 CHECKOUT_CODE
        uses: actions/checkout@v4

      - name: 🧬 EXTRACT_PAYLOAD
        run: |
          echo "DEPLOYING_TECH: ${{ github.event.client_payload.tech_name }}"
          echo "ACTION_SCRIPT: ${{ github.event.client_payload.action_script }}"

      - name: 🐳 DOCKER_INITIALIZE
        # 這裡假設你的「落地執行」是啟動一個 Docker 環境
        run: |
          # 模擬執行 AI 給出的部署指令
          ${{ github.event.client_payload.action_script }}
          
      - name: 🛰 NOTIFY_SUCCESS
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"chat_id": "${{ secrets.TG_CHAT_ID }}", "text": "✅ 部署完成：${{ github.event.client_payload.tech_name }} 已上線。"}' \
          https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage
