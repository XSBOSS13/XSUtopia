<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecosystem Submission — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker" data-lang-zh="Ecosystem Submission" data-lang-en="Ecosystem Submission">Ecosystem Submission</div>
        <h1
          data-lang-zh="把你的內容、提案或觀點送進平台。"
          data-lang-en="Submit your content, proposal, or perspective into the platform.">
          把你的內容、提案或觀點送進平台。
        </h1>
        <p
          data-lang-zh="你可以提交思想、茶、藝術、生態觀察或合作提案，作為平台未來擴張的一部分。"
          data-lang-en="You can submit thought, tea, art, ecosystem observations, or partner proposals as part of the platform’s future expansion.">
          你可以提交思想、茶、藝術、生態觀察或合作提案，作為平台未來擴張的一部分。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div class="panel" style="padding:28px; max-width:920px; margin:0 auto;">
          <div id="submissionGate" class="note" style="display:none; margin-bottom:20px;">請先登入後再送出提案。</div>

          <label class="label" for="submissionTitle">標題</label>
          <input id="submissionTitle" class="input" type="text" maxlength="120" />

          <label class="label" for="submissionCategory">類型</label>
          <select id="submissionCategory" class="select">
            <option value="thought">Thought</option>
            <option value="tea">Tea</option>
            <option value="art">Art</option>
            <option value="ecosystem">Ecosystem</option>
            <option value="partner">Partner</option>
          </select>

          <label class="label" for="submissionDescription">內容說明</label>
          <textarea id="submissionDescription" class="textarea" maxlength="4000"></textarea>

          <label class="label" for="submissionLink">參考連結（可選）</label>
          <input id="submissionLink" class="input" type="url" maxlength="500" />

          <button id="submissionBtn" class="btn btn-primary">送出提案</button>
          <div id="submissionStatus" class="status"></div>
        </div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let session = { user: null, role: "guest" };
    let locale = "zh";

    const TEXT = {
      zh: {
        needLogin: "請先登入後再送出提案。",
        submitting: "送出中...",
        success: "提案已送出。",
        failed: "提案送出失敗。"
      },
      en: {
        needLogin: "Please sign in before submitting.",
        submitting: "Submitting...",
        success: "Submission sent.",
        failed: "Failed to submit."
      }
    };

    async function initSubmission() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      const gate = document.getElementById("submissionGate");
      const status = document.getElementById("submissionStatus");

      if (!session.user) {
        gate.style.display = "block";
        gate.textContent = TEXT[locale].needLogin;
      }

      document.getElementById("submissionBtn").addEventListener("click", async () => {
        if (!session.user) {
          status.textContent = TEXT[locale].needLogin;
          return;
        }

        status.textContent = TEXT[locale].submitting;

        const payload = {
          user_id: session.user.id,
          title: (document.getElementById("submissionTitle").value || "").trim(),
          category: document.getElementById("submissionCategory").value,
          description: (document.getElementById("submissionDescription").value || "").trim(),
          link_url: (document.getElementById("submissionLink").value || "").trim()
        };

        const { error } = await client.from("ecosystem_submissions").insert([payload]);

        if (error) {
          console.error(error);
          status.textContent = TEXT[locale].failed;
          return;
        }

        status.textContent = TEXT[locale].success;

        ["submissionTitle", "submissionDescription", "submissionLink"].forEach((id) => {
          document.getElementById(id).value = "";
        });
        document.getElementById("submissionCategory").value = "thought";
      });

      window.onXSLocaleChange = (nextLocale) => {
        locale = nextLocale;
        if (!session.user) gate.textContent = TEXT[locale].needLogin;
      };
    }

    initSubmission();
  </script>
</body>
</html>
