<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .feed-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .feed-stat{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:12px;
      cursor:pointer;
    }
    .feed-stat.active{
      border-color:rgba(215,193,154,.24);
      color:var(--accent);
      background:rgba(215,193,154,.08);
    }
    .sort-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .sort-chip{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      cursor:pointer;
      font-size:12px;
    }
    .sort-chip.active{
      border-color:rgba(215,193,154,.24);
      color:var(--accent);
      background:rgba(215,193,154,.08);
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker" data-lang-zh="Content Flow" data-lang-en="Content Flow">Content Flow</div>
        <h1
          data-lang-zh="內容開始互相影響，平台才真正形成流。"
          data-lang-en="A platform becomes a flow only when content begins to affect other content.">
          內容開始互相影響，平台才真正形成流。
        </h1>
        <p
          data-lang-zh="你可以閱讀、按讚、收藏，並依照最新、熱門或精選邏輯切換內容排序。"
          data-lang-en="You can read, like, save, and switch the feed between newest, hottest, and featured-first ranking.">
          你可以閱讀、按讚、收藏，並依照最新、熱門或精選邏輯切換內容排序。
        </p>
      </div>
    </section>

    <section>
      <div class="container feed-layout reveal">
        <aside class="panel sidebar-panel">
          <div class="kicker" data-lang-zh="Filter" data-lang-en="Filter">Filter</div>
          <h2 style="margin:0 0 16px;" data-lang-zh="內容類型" data-lang-en="Post Types">內容類型</h2>

          <select id="feedTypeFilter" class="select">
            <option value="all">All</option>
            <option value="thought">Thought</option>
            <option value="tea">Tea</option>
            <option value="art">Art</option>
            <option value="ecosystem">Ecosystem</option>
            <option value="partner">Partner</option>
          </select>

          <div class="sort-group">
            <button class="sort-chip active" data-sort="latest">Latest</button>
            <button class="sort-chip" data-sort="hot">Hot</button>
            <button class="sort-chip" data-sort="featured">Featured</button>
          </div>

          <div style="margin-top:14px; display:flex; flex-direction:column; gap:12px;">
            <a href="submit.html" class="btn btn-primary" style="width:100%; justify-content:center;">前往發表</a>
            <a href="creator.html" class="btn" style="width:100%; justify-content:center;">查看個人內容頁</a>
            <a href="recommendations.html" class="btn" style="width:100%; justify-content:center;">查看推薦內容</a>
          </div>
        </aside>

        <section>
          <div id="feedList" class="post-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let locale = "zh";
    let typeFilter = "all";
    let sortMode = "latest";
    let session = { user: null, role: "guest" };

    const FEED_TEXT = {
      zh: {
        empty: "目前還沒有已發佈內容。",
        failed: "內容讀取失敗。",
        like: "讚",
        save: "收藏",
        saved: "已收藏",
        featured: "精選"
      },
      en: {
        empty: "No published content yet.",
        failed: "Failed to load feed.",
        like: "Like",
        save: "Save",
        saved: "Saved",
        featured: "Featured"
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    async function fetchFeed() {
      const feedList = document.getElementById("feedList");

      let query = client
        .from("post_metrics")
        .select("*")
        .eq("status", "published");

      if (typeFilter !== "all") {
        query = query.eq("post_type", typeFilter);
      }

      if (sortMode === "hot") {
        query = query.order("hot_score", { ascending: false }).order("created_at", { ascending: false });
      } else if (sortMode === "featured") {
        query = query.order("is_featured", { ascending: false }).order("created_at", { ascending: false });
      } else {
        query = query.order("created_at", { ascending: false });
      }

      const [{ data: posts, error }, { data: saves }] = await Promise.all([
        query,
        session.user
          ? client.from("saved_posts").select("*").eq("user_id", session.user.id)
          : Promise.resolve({ data: [] })
      ]);

      if (error) {
        console.error(error);
        feedList.innerHTML = `<div class="panel" style="padding:24px;">${FEED_TEXT[locale].failed}</div>`;
        return;
      }

      if (!posts || !posts.length) {
        feedList.innerHTML = `<div class="panel" style="padding:24px;">${FEED_TEXT[locale].empty}</div>`;
        return;
      }

      const savedSet = new Set((saves || []).map(item => item.post_id));

      feedList.innerHTML = posts.map(post => `
        <article class="post-card">
          <div class="post-meta">
            <div>
              <div class="post-author">${formatDate(post.created_at)}</div>
            </div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(post.post_type)}</span>
              ${post.is_featured ? `<span class="tag featured">${FEED_TEXT[locale].featured}</span>` : ""}
            </div>
          </div>

          <h3>${escapeHtml(post.title)}</h3>
          <p>${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>

          <div class="feed-actions">
            <button class="feed-stat" data-like-post="${post.id}">
              ${FEED_TEXT[locale].like} · ${post.like_count || 0}
            </button>
            <button class="feed-stat ${savedSet.has(post.id) ? 'active' : ''}" data-save-post="${post.id}">
              ${savedSet.has(post.id) ? FEED_TEXT[locale].saved : FEED_TEXT[locale].save}
            </button>
            <span class="feed-stat">Hot · ${post.hot_score || 0}</span>
          </div>
        </article>
      `).join("");

      bindFeedActions();
    }

    async function toggleLike(postId) {
      if (!session.user) {
        window.location.href = "auth.html";
        return;
      }

      const { data: existing } = await client
        .from("post_likes")
        .select("id")
        .eq("post_id", postId)
        .eq("user_id", session.user.id)
        .maybeSingle();

      if (existing?.id) {
        await client.from("post_likes").delete().eq("id", existing.id);
      } else {
        await client.from("post_likes").insert([{ post_id: postId, user_id: session.user.id }]);
      }

      await fetchFeed();
    }

    async function toggleSave(postId) {
      if (!session.user) {
        window.location.href = "auth.html";
        return;
      }

      const { data: existing } = await client
        .from("saved_posts")
        .select("id")
        .eq("post_id", postId)
        .eq("user_id", session.user.id)
        .maybeSingle();

      if (existing?.id) {
        await client.from("saved_posts").delete().eq("id", existing.id);
      } else {
        await client.from("saved_posts").insert([{ post_id: postId, user_id: session.user.id }]);
      }

      await fetchFeed();
    }

    function bindFeedActions() {
      document.querySelectorAll("[data-like-post]").forEach((btn) => {
        btn.addEventListener("click", () => toggleLike(btn.dataset.likePost));
      });

      document.querySelectorAll("[data-save-post]").forEach((btn) => {
        btn.addEventListener("click", () => toggleSave(btn.dataset.savePost));
      });
    }

    function bindSortActions() {
      document.querySelectorAll("[data-sort]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          document.querySelectorAll("[data-sort]").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          sortMode = btn.dataset.sort;
          await fetchFeed();
        });
      });
    }

    async function initFeed() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      document.getElementById("feedTypeFilter").addEventListener("change", async (e) => {
        typeFilter = e.target.value;
        await fetchFeed();
      });

      bindSortActions();

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await fetchFeed();
      };

      await fetchFeed();

      client
        .channel("xs-feed-realtime-v2")
        .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, async () => { await fetchFeed(); })
        .on("postgres_changes", { event: "*", schema: "public", table: "post_likes" }, async () => { await fetchFeed(); })
        .on("postgres_changes", { event: "*", schema: "public", table: "saved_posts" }, async () => { await fetchFeed(); })
        .on("postgres_changes", { event: "*", schema: "public", table: "post_comments" }, async () => { await fetchFeed(); })
        .subscribe();
    }

    initFeed();
  </script>
</body>
</html>
