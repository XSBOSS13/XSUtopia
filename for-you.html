<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>
      <nav class="nav-links">
        <a href="index.html">首頁</a>
        <a href="commons.html">公共社群</a>
        <a href="partners.html">合作社區</a>
        <a href="store.html">商圈文化</a>
        <a href="join.html">加入平台</a>
      </nav>
      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn">登入</a>
          <a href="auth.html" class="btn">註冊</a>
        </div>
        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker">For You</div>
        <h1
          data-lang-zh="從你的互動開始，平台形成個人化入口。"
          data-lang-en="From your interactions, the platform begins forming a personal entry point.">
          從你的互動開始，平台形成個人化入口。
        </h1>
        <p
          data-lang-zh="這裡會優先顯示和你收藏傾向接近的內容。"
          data-lang-en="This page prioritizes content close to your saved preferences.">
          這裡會優先顯示和你收藏傾向接近的內容。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="forYouGate" class="panel" style="padding:24px; display:none;">
          <p class="note">請先登入後查看 For You。</p>
        </div>
        <div id="forYouList" class="post-list"></div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let locale = "zh";
    let session = { user: null, role: "guest" };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    async function renderForYou() {
      const gate = document.getElementById("forYouGate");
      const list = document.getElementById("forYouList");

      if (!session.user) {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = locale === "en"
          ? "Please sign in to view For You."
          : "請先登入後查看 For You。";
        list.innerHTML = "";
        return;
      }

      gate.style.display = "none";

      const { data: saved } = await client
        .from("saved_posts")
        .select("post_id")
        .eq("user_id", session.user.id);

      const savedIds = (saved || []).map(item => item.post_id);

      let preferredTypes = [];

      if (savedIds.length) {
        const { data: savedPosts } = await client
          .from("posts")
          .select("post_type")
          .in("id", savedIds);

        preferredTypes = [...new Set((savedPosts || []).map(item => item.post_type).filter(Boolean))];
      }

      let query = client
        .from("post_metrics")
        .select("*")
        .eq("status", "published");

      if (preferredTypes.length) {
        query = query.in("post_type", preferredTypes);
      }

      const { data, error } = await query
        .order("hot_score", { ascending: false })
        .order("created_at", { ascending: false })
        .limit(20);

      if (error || !data || !data.length) {
        list.innerHTML = `<div class="panel" style="padding:24px;">${locale === "en" ? "No personalized content yet." : "目前還沒有可推薦給你的內容。"}</div>`;
        return;
      }

      list.innerHTML = data.map(post => `
        <article class="post-card">
          <div class="post-meta">
            <div class="post-tags">
              <span class="tag">${escapeHtml(post.post_type)}</span>
              ${post.is_featured ? `<span class="tag featured">${locale === "en" ? "Featured" : "精選"}</span>` : ""}
            </div>
          </div>
          <h3>${escapeHtml(post.title)}</h3>
          <p>${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>
          <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
            <span class="tag">Hot · ${post.hot_score}</span>
            <span class="tag">Like · ${post.like_count}</span>
            <span class="tag">Save · ${post.save_count}</span>
          </div>
        </article>
      `).join("");
    }

    async function initForYou() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();
      client = await AuthUI.getClient();
      locale = AuthUI.getLocale();
      session = auth.getSession();

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await renderForYou();
      };

      await renderForYou();
    }

    initForYou();
  </script>
</body>
</html>
