<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XS UTOPIA</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x:hidden;
}

/* opening */
#opening {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:1s;
}
#opening h1 {
  font-size:28px;
  letter-spacing:0.4em;
  opacity:0;
  animation:fade 2s forwards;
}
@keyframes fade {to{opacity:1;}}

/* hero */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h1 {
  font-size:clamp(48px,8vw,120px);
  line-height:1.05;
  font-weight:300;
}
.hero span {
  opacity:0.4;
}

/* section */
.section {
  padding:120px 20px;
  text-align:center;
}

/* ecosystem */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  max-width:900px;
  margin:auto;
}
.card {
  border:1px solid rgba(255,255,255,0.1);
  padding:40px 20px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover {
  background:rgba(255,255,255,0.05);
}

/* language */
.lang-toggle {
  position:fixed;
  top:20px;
  right:20px;
  border:1px solid #fff;
  padding:8px 14px;
  cursor:pointer;
  font-size:12px;
}

/* modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content {
  max-width:500px;
  text-align:center;
}
</style>
</head>

<body>

<div id="opening">
  <h1>XS UTOPIA</h1>
</div>

<div class="lang-toggle" onclick="toggleLang()">EN</div>

<section class="hero">
  <h1 id="heroText">
    You are not here<br>
    to consume.<br>
    <span>You are here to see.</span>
  </h1>
</section>

<section class="section">
  <h2 id="ecoTitle">Enter the system</h2>
  <div class="grid">
    <div class="card" onclick="openModal('哲學是你觀看世界的方式')">Philosophy</div>
    <div class="card" onclick="openModal('茶是一種狀態的轉換')">Ritual</div>
    <div class="card" onclick="openModal('產品是意識的載體')">Product</div>
    <div class="card" onclick="openModal('社群是思想的擴散')">Community</div>
    <div class="card" onclick="openModal('網絡是未來的結構')">Network</div>
  </div>
</section>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" id="modalText"></div>
</div>

<script>

/* opening */
window.onload = () => {
  setTimeout(()=>{
    const o = document.getElementById("opening");
    o.style.opacity=0;
    setTimeout(()=>o.remove(),1000);
  },1800);
};

/* modal */
function openModal(text){
  document.getElementById("modalText").innerText = text;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* language */
let lang="en";

function toggleLang(){
  lang = lang==="en" ? "zh" : "en";

  if(lang==="zh"){
    document.getElementById("heroText").innerHTML =
      "你不是來消費世界<br>而是來看見它<br><span>存在，本身就是答案</span>";
    document.getElementById("ecoTitle").innerText = "進入系統";
  } else {
    document.getElementById("heroText").innerHTML =
      "You are not here<br>to consume.<br><span>You are here to see.</span>";
    document.getElementById("ecoTitle").innerText = "Enter the system";
  }
}

</script>

</body>
</html>
