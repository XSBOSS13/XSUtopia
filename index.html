<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERPUNK COMMAND CENTER</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #0ff;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        >> SYSTEM: ACTIVE<br>
        >> DATA STREAM: ENCRYPTED<br>
        >> MODE: CYBERPUNK_NEON
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0/build/three.module.js';
        import { EffectComposer } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // --- 核心場景設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02); // 增加一點失焦感

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 後期處理 (Bloom 效果是霓虹感的靈魂) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2; // 讓較暗的字元也能發光
        bloomPass.strength = 2.5;  // 強烈的光暈
        bloomPass.radius = 1.0;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 數據流幾何體與 Shader ---
        const columnCount = 100;
        const charCount = 50;
        const totalChars = columnCount * charCount;

        // 隨機字元 (0-9, A-F)
        const chars = '0123456789ABCDEF';
        const charTexture = createCharTexture();

        // 實例化幾何體 (InstancedMesh) - 效能關鍵
        const geometry = new THREE.PlaneGeometry(0.8, 1);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTexture: { value: charTexture },
                uTime: { value: 0 },
                uColorBlue: { value: new THREE.Color(0x00ffff) }, // 電光藍
                uColorPink: { value: new THREE.Color(0xff00ff) }, // 霓虹粉
                uColorPurple: { value: new THREE.Color(0x4b0082) }, // 毒性紫
            },
            vertexShader: `
                uniform float uTime;
                varying vec2 vUv;
                varying float vOpacity;
                varying float vColorSelect;

                // 隨機函數
                float rand(vec2 co) {
                    return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
                }

                void main() {
                    vUv = uv;

                    // 取得當前實例的索引和列索引
                    float instanceID = float(gl_InstanceID);
                    float colID = floor(instanceID / 50.0);
                    float rowID = mod(instanceID, 50.0);

                    // 計算掉落邏輯
                    float speed = 1.0 + rand(vec2(colID, 1.0)) * 2.0;
                    float yOffset = mod(uTime * speed + rand(vec2(colID, 2.0)) * 50.0, 50.0);
                    
                    // 設定位置 (x 為列，y 為掉落位置)
                    vec3 pos = position;
                    pos.x += colID - 50.0 + rand(vec2(colID, 3.0)) * 0.5;
                    pos.y += 25.0 - rowID - yOffset;
                    pos.z += rand(vec2(colID, rowID)) * 2.0; // 增加一點 3D 深度

                    // 計算淡出與色彩選擇
                    vOpacity = 1.0 - (rowID / 50.0); // 尾部淡出
                    vColorSelect = rand(vec2(colID, rowID)); // 每個字元隨機顏色

                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                uniform vec3 uColorBlue;
                uniform vec3 uColorPink;
                uniform vec3 uColorPurple;
                varying vec2 vUv;
                varying float vOpacity;
                varying float vColorSelect;

                void main() {
                    // 解析字元紋理
                    vec4 texColor = texture2D(uTexture, vUv);
                    if (texColor.a < 0.1) discard; // 剔除透明區域

                    // 賽博龐克色彩漸層邏輯
                    vec3 finalColor;
                    if (vColorSelect < 0.3) {
                        finalColor = uColorBlue;
                    } else if (vColorSelect < 0.6) {
                        finalColor = uColorPink;
                    } else {
                        finalColor = uColorPurple;
                    }

                    // 讓頭部變白 (類 Matrix 效果，但更亮)
                    if (vOpacity > 0.95) finalColor = vec3(1.0, 1.0, 1.0);

                    gl_FragColor = vec4(finalColor, texColor.a * vOpacity * 2.0); // 增加亮度以觸發 Bloom
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending, // 加法混合，讓光暈疊加
            depthTest: false
        });

        const mesh = new THREE.InstancedMesh(geometry, material, totalChars);
        scene.add(mesh);

        // --- 字元紋理生成 (Canvas) ---
        function createCharTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = 'bold 96px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 我們只取一個隨機字元作為例子，Shader 會處理它的掉落
            ctx.fillText('A', 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // 保持鋸齒感
            return texture;
        }

        // --- 動畫循環 ---
        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value += 0.01;
            composer.render();
        }

        animate();

        // --- 視窗調整 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
