<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .notification-card{
      padding:22px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:var(--shadow);
    }
    .notification-card.unread{
      border-color:rgba(215,193,154,.22);
      background:rgba(215,193,154,.06);
    }
    .notification-card + .notification-card{
      margin-top:14px;
    }
    .notification-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker" data-lang-zh="Notifications" data-lang-en="Notifications">Notifications</div>
        <h1
          data-lang-zh="把平台中的更新集中到同一個入口。"
          data-lang-en="Bring updates across the platform into one place.">
          把平台中的更新集中到同一個入口。
        </h1>
        <p
          data-lang-zh="這裡會顯示系統通知、申請狀態與後續平台更新。"
          data-lang-en="This page shows system notices, application status, and later platform updates.">
          這裡會顯示系統通知、申請狀態與後續平台更新。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="notificationGate" class="panel" style="padding:28px; display:none;">
          <p class="note">請先登入後查看通知。</p>
        </div>

        <div class="panel" style="padding:28px; margin-bottom:22px;">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="markAllReadBtn" class="btn">全部標示已讀</button>
            <button id="reloadNotificationsBtn" class="btn">重新整理</button>
          </div>
        </div>

        <div id="notificationList"></div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let session = { user: null, role: "guest" };
    let locale = "zh";

    const TEXT = {
      zh: {
        needLogin: "請先登入後查看通知。",
        empty: "目前沒有通知。",
        failed: "通知讀取失敗。",
        unread: "未讀",
        read: "已讀",
        markRead: "標示已讀",
        allRead: "已全部標示為已讀。"
      },
      en: {
        needLogin: "Please sign in to view notifications.",
        empty: "There are no notifications.",
        failed: "Failed to load notifications.",
        unread: "Unread",
        read: "Read",
        markRead: "Mark as Read",
        allRead: "All notifications marked as read."
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    async function markRead(id) {
      await client.from("notifications").update({ is_read: true }).eq("id", id);
      await renderNotifications();
    }

    async function markAllRead() {
      if (!session.user) return;
      await client.from("notifications").update({ is_read: true }).eq("user_id", session.user.id).eq("is_read", false);
      await renderNotifications();
    }

    async function renderNotifications() {
      const gate = document.getElementById("notificationGate");
      const list = document.getElementById("notificationList");

      if (!session.user) {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = TEXT[locale].needLogin;
        list.innerHTML = "";
        return;
      }

      gate.style.display = "none";

      const { data, error } = await client
        .from("notifications")
        .select("*")
        .eq("user_id", session.user.id)
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].failed}</div>`;
        return;
      }

      if (!data || !data.length) {
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].empty}</div>`;
        return;
      }

      list.innerHTML = data.map(item => `
        <div class="notification-card ${item.is_read ? '' : 'unread'}">
          <div class="notification-meta">
            <div>
              <strong style="display:block; margin-bottom:6px;">${escapeHtml(item.title)}</strong>
              <span class="tag">${escapeHtml(item.type)}</span>
              <span class="tag ${item.is_read ? '' : 'featured'}">${item.is_read ? TEXT[locale].read : TEXT[locale].unread}</span>
            </div>
            <div class="note">${formatDate(item.created_at)}</div>
          </div>
          <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(item.message)}</p>
          ${item.is_read ? "" : `<div style="margin-top:16px;"><button class="btn" data-read-id="${item.id}">${TEXT[locale].markRead}</button></div>`}
        </div>
      `).join("");

      document.querySelectorAll("[data-read-id]").forEach((btn) => {
        btn.addEventListener("click", () => markRead(btn.dataset.readId));
      });
    }

    async function initNotifications() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      document.getElementById("markAllReadBtn").addEventListener("click", markAllRead);
      document.getElementById("reloadNotificationsBtn").addEventListener("click", renderNotifications);

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await renderNotifications();
      };

      await renderNotifications();
    }

    initNotifications();
  </script>
</body>
</html>
