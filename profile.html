<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — XS UTOPIA</title>
  <style>
    :root{
      --bg:#060606;
      --panel:rgba(255,255,255,.04);
      --line:rgba(255,255,255,.10);
      --text:#f5f1e8;
      --muted:rgba(245,241,232,.72);
      --soft:rgba(245,241,232,.46);
      --accent:#d7c19a;
      --shadow:0 24px 80px rgba(0,0,0,.34);
      --max:1280px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(215,193,154,.12), transparent 24%),
        linear-gradient(180deg,#050505 0%, #090909 42%, #070707 100%);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
    }

    a{color:inherit;text-decoration:none}

    .container{
      width:min(calc(100% - 32px), var(--max));
      margin:0 auto;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:80;
      border-bottom:1px solid rgba(255,255,255,.05);
      background:rgba(10,10,10,.56);
      backdrop-filter:blur(18px);
    }

    .nav-inner{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark{
      width:34px;
      height:34px;
      border-radius:50%;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.03);
      color:var(--accent);
      font-size:12px;
    }

    .brand-name{
      font-size:13px;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .nav-links{
      display:flex;
      gap:18px;
      align-items:center;
      color:var(--muted);
      font-size:14px;
      flex-wrap:wrap;
    }

    .nav-links a:hover,
    .nav-links a.active{
      color:var(--text);
    }

    .auth-right{
      display:flex;
      align-items:center;
      gap:12px;
      margin-left:auto;
    }

    .btn{
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
    }

    .btn-primary{
      background:var(--text);
      color:#0a0a0a;
      border-color:transparent;
    }

    .profile-hero{
      padding:110px 0 40px;
    }

    .profile-grid{
      display:grid;
      grid-template-columns:.88fr 1.12fr;
      gap:22px;
      align-items:start;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
      padding:28px;
    }

    .avatar{
      width:108px;
      height:108px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:34px;
      font-weight:700;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:var(--accent);
      margin-bottom:18px;
    }

    .profile-name{
      font-size:36px;
      line-height:1.05;
      margin:0 0 10px;
    }

    .role-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      margin-bottom:16px;
    }

    .profile-email{
      color:var(--muted);
      line-height:1.8;
      margin-bottom:18px;
      word-break:break-all;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:20px;
    }

    .stat{
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    .stat strong{
      display:block;
      font-size:28px;
      margin-bottom:6px;
      color:var(--text);
    }

    .stat span{
      color:var(--soft);
      font-size:13px;
    }

    .label{
      display:block;
      margin-bottom:10px;
      color:var(--muted);
      font-size:13px;
    }

    .input,
    .textarea{
      width:100%;
      border:none;
      outline:none;
      color:var(--text);
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px 18px;
      font:inherit;
      margin-bottom:16px;
    }

    .textarea{
      min-height:160px;
      resize:vertical;
      line-height:1.8;
    }

    .status{
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
      min-height:20px;
    }

    .subgrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      margin-top:22px;
    }

    .mini-list{
      color:var(--muted);
      line-height:1.9;
      font-size:15px;
    }

    @media (max-width:980px){
      .profile-grid,.subgrid{grid-template-columns:1fr}
    }

    @media (max-width:760px){
      .nav-links{display:none}
      .stats{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html">首頁</a>
        <a href="world.html">世界觀</a>
        <a href="commons.html">Commons</a>
        <a href="feed.html">內容流</a>
        <a href="join.html">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" style="display:flex; gap:10px;">
          <a href="auth.html" class="btn">登入</a>
          <a href="auth.html" class="btn">註冊</a>
        </div>

        <div id="authMember" style="display:none; align-items:center; gap:10px;">
          <div style="display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;">
            <strong id="authMemberName" style="font-size:13px; color:var(--text);">Member</strong>
            <span id="authMemberRole" style="font-size:11px; color:var(--soft);">Member</span>
          </div>
          <button id="authSignOutBtn" class="btn">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main class="profile-hero">
    <div class="container">
      <div class="profile-grid">
        <section class="panel">
          <div id="profileAvatarPreview" class="avatar">M</div>
          <h1 id="profileName" class="profile-name">Member</h1>
          <div id="profileRole" class="role-badge">Member</div>
          <div id="profileEmail" class="profile-email"></div>

          <div class="stats">
            <div class="stat">
              <strong id="profileCommentCount">0</strong>
              <span>我的留言</span>
            </div>
            <div class="stat">
              <strong id="profilePostCount">0</strong>
              <span>我的內容</span>
            </div>
            <div class="stat">
              <strong id="profileApplicationCount">0</strong>
              <span>合作申請</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 style="margin-top:0; margin-bottom:18px;">個人設定</h2>

          <label class="label" for="profileDisplayName">顯示名稱</label>
          <input id="profileDisplayName" class="input" type="text" maxlength="24" placeholder="你的名稱" />

          <label class="label" for="profileBio">Bio</label>
          <textarea id="profileBio" class="textarea" placeholder="寫下一段關於你的文字。"></textarea>

          <button id="profileSaveBtn" class="btn btn-primary">儲存變更</button>
          <div id="profileStatus" class="status"></div>
        </section>
      </div>

      <div class="subgrid">
        <section class="panel">
          <h2 style="margin-top:0; margin-bottom:18px;">我的內容路徑</h2>
          <div class="mini-list">
            • 你未來可以在這裡看到自己的內容流與發表紀錄。<br>
            • 也可以延伸為思想、藝術、茶文化、生態等分類內容。<br>
            • 這一頁會成為會員真正「存在」的平台節點。
          </div>
        </section>

        <section class="panel">
          <h2 style="margin-top:0; margin-bottom:18px;">我的申請與參與</h2>
          <div class="mini-list">
            • 商家合作申請狀態<br>
            • 生態系內容發表狀態<br>
            • 會員參與足跡與平台連結
          </div>
        </section>
      </div>
    </div>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    AuthUI.initHeaderAuth();
    AuthUI.initProfilePage();
  </script>
</body>
</html>
