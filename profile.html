<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-hero{
      padding:110px 0 40px;
    }
    .profile-grid{
      display:grid;
      grid-template-columns:.88fr 1.12fr;
      gap:22px;
      align-items:start;
    }
    .profile-panel{
      padding:28px;
    }
    .avatar{
      width:108px;
      height:108px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:34px;
      font-weight:700;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:var(--accent);
      margin-bottom:18px;
    }
    .profile-name{
      font-size:36px;
      line-height:1.05;
      margin:0 0 10px;
    }
    .role-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      margin-bottom:16px;
    }
    .profile-email{
      color:var(--muted);
      line-height:1.8;
      margin-bottom:18px;
      word-break:break-all;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:20px;
    }
    .stat{
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
    .stat strong{
      display:block;
      font-size:28px;
      margin-bottom:6px;
      color:var(--text);
    }
    .stat span{
      color:var(--soft);
      font-size:13px;
    }
    .subgrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      margin-top:22px;
    }
    .mini-list{
      color:var(--muted);
      line-height:1.9;
      font-size:15px;
    }
    @media (max-width:980px){
      .profile-grid,.subgrid{grid-template-columns:1fr}
    }
    @media (max-width:760px){
      .stats{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="explore.html" data-i18n-key="nav_explore">探索中心</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main class="profile-hero">
    <div class="container">
      <div class="profile-grid reveal">
        <section class="panel profile-panel">
          <div id="profileAvatarPreview" class="avatar">M</div>
          <h1 id="profileName" class="profile-name">Member</h1>
          <div id="profileRole" class="role-badge">Member</div>
          <div id="profileEmail" class="profile-email"></div>

          <div class="stats">
            <div class="stat">
              <strong id="profileCommentCount">0</strong>
              <span data-lang-zh="我的留言" data-lang-en="My Comments">我的留言</span>
            </div>
            <div class="stat">
              <strong id="profilePostCount">0</strong>
              <span data-lang-zh="我的文章" data-lang-en="My Posts">我的文章</span>
            </div>
            <div class="stat">
              <strong id="profileApplicationCount">0</strong>
              <span data-lang-zh="合作申請" data-lang-en="Applications">合作申請</span>
            </div>
          </div>
        </section>

        <section class="panel profile-panel">
          <h2 style="margin-top:0; margin-bottom:18px;"
              data-lang-zh="個人設定"
              data-lang-en="Profile Settings">
            個人設定
          </h2>

          <label class="label" for="profileDisplayName" data-lang-zh="顯示名稱" data-lang-en="Display Name">顯示名稱</label>
          <input id="profileDisplayName" class="input" type="text" maxlength="24" placeholder="你的名稱" />

          <label class="label" for="profileBio" data-lang-zh="Bio" data-lang-en="Bio">Bio</label>
          <textarea id="profileBio" class="textarea" placeholder="寫下一段關於你的文字。"></textarea>

          <button id="profileSaveBtn" class="btn btn-primary"
                  data-lang-zh="儲存變更"
                  data-lang-en="Save Changes">
            儲存變更
          </button>
          <div id="profileStatus" class="status"></div>
        </section>
      </div>

      <div class="subgrid reveal">
        <section class="panel profile-panel">
          <h2 style="margin-top:0; margin-bottom:18px;"
              data-lang-zh="我的內容路徑"
              data-lang-en="My Content Path">
            我的內容路徑
          </h2>
          <div class="mini-list"
               data-lang-zh="• 你未來可以在這裡看到自己的內容流與發表紀錄。<br>• 也可以延伸為思想、藝術、茶文化、生態等分類內容。<br>• 這一頁會成為會員真正「存在」的平台節點。"
               data-lang-en="• Here you will later see your content flow and publication history.<br>• It can extend into thought, art, tea culture, and ecosystem categories.<br>• This page becomes the member’s true node of presence within the platform.">
            • 你未來可以在這裡看到自己的內容流與發表紀錄。<br>
            • 也可以延伸為思想、藝術、茶文化、生態等分類內容。<br>
            • 這一頁會成為會員真正「存在」的平台節點。
          </div>
        </section>

        <section class="panel profile-panel">
          <h2 style="margin-top:0; margin-bottom:18px;"
              data-lang-zh="我的申請與參與"
              data-lang-en="My Applications & Participation">
            我的申請與參與
          </h2>
          <div class="mini-list"
               data-lang-zh="• 商家合作申請狀態<br>• 生態系內容發表狀態<br>• 會員參與足跡與平台連結"
               data-lang-en="• Community partner application status<br>• Ecosystem submission status<br>• Participation traces and platform connections">
            • 商家合作申請狀態<br>
            • 生態系內容發表狀態<br>
            • 會員參與足跡與平台連結
          </div>
        </section>
      </div>
    </div>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    async function initProfilePage() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      const client = await AuthUI.getClient();
      const { user } = auth.getSession();

      if (!user) {
        window.location.href = "auth.html";
        return;
      }

      const { data: profile } = await client
        .from("user_profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      const displayName =
        profile?.display_name ||
        (user.email ? user.email.split("@")[0] : "member");

      document.getElementById("profileName").textContent = displayName;
      document.getElementById("profileRole").textContent = profile?.role === "admin" ? "Admin" : "Member";
      document.getElementById("profileEmail").textContent = user.email || "";
      document.getElementById("profileDisplayName").value = displayName;
      document.getElementById("profileBio").value = profile?.bio || "";

      const avatar = document.getElementById("profileAvatarPreview");
      avatar.textContent = displayName.slice(0, 1).toUpperCase();

      const [{ count: commentCount }, { count: postCount }] = await Promise.all([
        client.from("post_comments").select("*", { count: "exact", head: true }).eq("user_id", user.id),
        client.from("posts").select("*", { count: "exact", head: true }).eq("user_id", user.id)
      ]);

      document.getElementById("profileCommentCount").textContent = commentCount ?? 0;
      document.getElementById("profilePostCount").textContent = postCount ?? 0;
      document.getElementById("profileApplicationCount").textContent = 0;

      document.getElementById("profileSaveBtn").addEventListener("click", async () => {
        const btn = document.getElementById("profileSaveBtn");
        const status = document.getElementById("profileStatus");
        btn.disabled = true;
        status.textContent = AuthUI.getLocale() === "en" ? "Saving..." : "儲存中...";

        const { error } = await client
          .from("user_profiles")
          .update({
            display_name: document.getElementById("profileDisplayName").value.trim().slice(0, 24),
            bio: document.getElementById("profileBio").value.trim(),
            updated_at: new Date().toISOString()
          })
          .eq("id", user.id);

        btn.disabled = false;
        status.textContent = error
          ? (AuthUI.getLocale() === "en" ? "Failed to update." : "更新失敗。")
          : (AuthUI.getLocale() === "en" ? "Profile updated." : "個人資料已更新。");
      });
    }

    initProfilePage();
  </script>
</body>
</html>
