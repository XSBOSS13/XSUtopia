<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>

      <nav class="nav-links">
        <a href="index.html" data-i18n-key="nav_home">首頁</a>
        <a href="commons.html" data-i18n-key="nav_commons">公共社群</a>
        <a href="partners.html" data-i18n-key="nav_partners">合作社區</a>
        <a href="store.html" data-i18n-key="nav_store">商圈文化</a>
        <a href="join.html" data-i18n-key="nav_join">加入平台</a>
      </nav>

      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn" data-i18n-key="login">登入</a>
          <a href="auth.html" class="btn" data-i18n-key="register">註冊</a>
        </div>

        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn" data-i18n-key="logout">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker" data-lang-zh="Saved Posts" data-lang-en="Saved Posts">Saved Posts</div>
        <h1
          data-lang-zh="把你想保留的內容集中起來。"
          data-lang-en="Gather the content you want to keep.">
          把你想保留的內容集中起來。
        </h1>
        <p
          data-lang-zh="這裡收納你在平台中收藏過的文章，作為未來回看、整理與策展的個人入口。"
          data-lang-en="This page collects the posts you have saved across the platform as a personal entry for revisiting, organizing, and future curation.">
          這裡收納你在平台中收藏過的文章，作為未來回看、整理與策展的個人入口。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="savedGate" class="panel" style="padding:28px; display:none;">
          <p class="note">請先登入後查看收藏內容。</p>
        </div>

        <div id="savedList" class="post-list"></div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let session = { user: null, role: "guest" };
    let locale = "zh";

    const TEXT = {
      zh: {
        needLogin: "請先登入後查看收藏內容。",
        empty: "你目前還沒有收藏任何內容。",
        failed: "收藏內容載入失敗。"
      },
      en: {
        needLogin: "Please sign in to view saved posts.",
        empty: "You have not saved any content yet.",
        failed: "Failed to load saved posts."
      }
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    async function renderSaved() {
      const gate = document.getElementById("savedGate");
      const list = document.getElementById("savedList");

      if (!session.user) {
        gate.style.display = "block";
        gate.querySelector(".note").textContent = TEXT[locale].needLogin;
        list.innerHTML = "";
        return;
      }

      gate.style.display = "none";

      const { data: saved, error: saveError } = await client
        .from("saved_posts")
        .select("post_id")
        .eq("user_id", session.user.id);

      if (saveError) {
        console.error(saveError);
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].failed}</div>`;
        return;
      }

      const ids = (saved || []).map(item => item.post_id);
      if (!ids.length) {
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].empty}</div>`;
        return;
      }

      const { data: posts, error: postError } = await client
        .from("posts")
        .select("*")
        .in("id", ids)
        .order("created_at", { ascending: false });

      if (postError) {
        console.error(postError);
        list.innerHTML = `<div class="panel" style="padding:24px;">${TEXT[locale].failed}</div>`;
        return;
      }

      list.innerHTML = (posts || []).map(post => `
        <article class="post-card">
          <div class="post-meta">
            <div class="post-author">${formatDate(post.created_at)}</div>
            <div class="post-tags">
              <span class="tag">${escapeHtml(post.post_type)}</span>
              ${post.is_featured ? `<span class="tag featured">${locale === "en" ? "Featured" : "精選"}</span>` : ""}
            </div>
          </div>
          <h3>${escapeHtml(post.title)}</h3>
          <p>${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>
        </article>
      `).join("");
    }

    async function initSaved() {
      const auth = await AuthUI.initHeaderAuth();
      AuthUI.initReveal();

      client = await AuthUI.getClient();
      session = auth.getSession();
      locale = AuthUI.getLocale();

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await renderSaved();
      };

      await renderSaved();
    }

    initSaved();
  </script>
</body>
</html>
