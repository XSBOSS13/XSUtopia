<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="opening"><span>XS UTOPIA</span></div>
<button id="langToggle" class="lang-toggle">EN</button>

<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html">
      <div class="brand-mark">XS</div>
      <div class="brand-name">XS UTOPIA</div>
    </a>

    <nav class="nav-links">
      <a href="index.html">首頁</a>
      <a href="commons.html">公共社群</a>
      <a href="partners.html">合作社區</a>
      <a href="store.html">商圈文化</a>
      <a href="join.html">加入平台</a>
    </nav>

    <div class="auth-right">
      <div id="authGuest">
        <a href="auth.html" class="btn">登入</a>
      </div>
      <div id="authMember" style="display:none;">
        <a href="profile.html"><strong id="authMemberName"></strong></a>
      </div>
    </div>
  </div>
</header>

<main>
<section class="hero">
  <div class="container">
    <h1>搜尋平台內容</h1>
    <p>搜尋思想、茶、藝術與節點內容。</p>
  </div>
</section>

<section>
  <div class="container">
    <input id="searchInput" class="input" placeholder="輸入關鍵字..." />
    <div id="searchResults" style="margin-top:20px;"></div>
  </div>
</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-ui.js"></script>
<script>
let client;

async function searchPosts(q){
  const { data } = await client
    .from("posts")
    .select("*")
    .ilike("title", `%${q}%`)
    .eq("status","published");

  render(data);
}

function render(data){
  const el = document.getElementById("searchResults");

  if(!data.length){
    el.innerHTML = `<div class="panel">沒有結果</div>`;
    return;
  }

  el.innerHTML = data.map(p=>`
    <div class="post-card">
      <h3>${p.title}</h3>
      <p>${p.content.slice(0,120)}...</p>
    </div>
  `).join("");
}

async function init(){
  await AuthUI.initHeaderAuth();
  client = await AuthUI.getClient();

  document.getElementById("searchInput").addEventListener("input", e=>{
    const q = e.target.value.trim();
    if(q.length > 1) searchPosts(q);
  });
}

init();
</script>
</body>
</html>
