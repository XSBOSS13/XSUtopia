<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending — XS UTOPIA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .rank-list{
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .rank-card{
      padding:24px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:auto 1fr;
      gap:18px;
      align-items:start;
    }
    .rank-no{
      font-size:32px;
      color:var(--accent);
      min-width:42px;
      line-height:1;
      font-family:var(--font-en-display);
    }
  </style>
</head>
<body>
  <div id="opening"><span>XS UTOPIA</span></div>
  <button id="langToggle" class="lang-toggle">EN</button>

  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">XS</div>
        <div class="brand-name">XS UTOPIA</div>
      </a>
      <nav class="nav-links">
        <a href="index.html">首頁</a>
        <a href="commons.html">公共社群</a>
        <a href="partners.html">合作社區</a>
        <a href="store.html">商圈文化</a>
        <a href="join.html">加入平台</a>
      </nav>
      <div class="auth-right">
        <div id="authGuest" class="auth-guest">
          <a href="auth.html" class="btn">登入</a>
          <a href="auth.html" class="btn">註冊</a>
        </div>
        <div id="authMember" class="auth-member" style="display:none;">
          <a href="profile.html" class="auth-member-meta">
            <strong id="authMemberName">Member</strong>
            <span id="authMemberRole">Member</span>
          </a>
          <button id="authSignOutBtn" class="btn">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container reveal">
        <div class="kicker">Trending</div>
        <h1
          data-lang-zh="把平台中最有動能的內容集中起來。"
          data-lang-en="Surface the most active content across the platform.">
          把平台中最有動能的內容集中起來。
        </h1>
        <p
          data-lang-zh="這裡顯示近期與本週值得優先被看見的內容。"
          data-lang-en="This page highlights content worth seeing first this week and recently.">
          這裡顯示近期與本週值得優先被看見的內容。
        </p>
      </div>
    </section>

    <section>
      <div class="container reveal">
        <div id="trendingList" class="rank-list"></div>
      </div>
    </section>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-ui.js"></script>
  <script>
    let client = null;
    let locale = "zh";

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    async function renderTrending() {
      const el = document.getElementById("trendingList");
      const { data, error } = await client
        .from("weekly_trending_posts")
        .select("*")
        .order("weekly_score", { ascending: false })
        .order("created_at", { ascending: false })
        .limit(20);

      if (error || !data || !data.length) {
        el.innerHTML = `<div class="panel" style="padding:24px;">${locale === "en" ? "No trending content yet." : "目前還沒有熱門內容。"}</div>`;
        return;
      }

      el.innerHTML = data.map((post, idx) => `
        <article class="rank-card">
          <div class="rank-no">${idx + 1}</div>
          <div>
            <div class="post-meta">
              <div class="post-tags">
                <span class="tag">${escapeHtml(post.post_type)}</span>
                ${post.is_featured ? `<span class="tag featured">${locale === "en" ? "Featured" : "精選"}</span>` : ""}
              </div>
            </div>
            <h3 style="margin:6px 0 12px;">${escapeHtml(post.title)}</h3>
            <p style="margin:0; color:var(--muted); line-height:1.9;">${escapeHtml(post.content).replace(/\n/g, "<br>")}</p>
            <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
              <span class="tag">Weekly · ${post.weekly_score}</span>
              <span class="tag">Hot · ${post.hot_score}</span>
              <span class="tag">Like · ${post.like_count}</span>
              <span class="tag">Comment · ${post.comment_count}</span>
              <span class="tag">Save · ${post.save_count}</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    async function initTrending() {
      await AuthUI.initHeaderAuth();
      AuthUI.initReveal();
      client = await AuthUI.getClient();
      locale = AuthUI.getLocale();

      window.onXSLocaleChange = async (nextLocale) => {
        locale = nextLocale;
        await renderTrending();
      };

      await renderTrending();
    }

    initTrending();
  </script>
</body>
</html>
